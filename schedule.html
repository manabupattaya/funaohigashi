<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>船穂東お題目プロジェクト — スケジュール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:#1A1A2A;color:#F1EFE8;min-height:100vh;}

/* ヘッダー */
.header{background:linear-gradient(135deg,#2C1A2E 0%,#1A1A2A 100%);padding:14px 20px 12px;display:flex;align-items:center;gap:10px;border-bottom:2px solid #D4537E;}
.header-icon{font-size:24px;}
.header-title{font-size:17px;font-weight:600;}
.header-sub{font-size:11px;color:#B4B2A9;margin-top:2px;}
.back-btn{margin-left:auto;background:transparent;border:1px solid #444460;color:#B4B2A9;font-size:12px;padding:5px 12px;border-radius:999px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;}
.back-btn:hover{border-color:#D4537E;color:#D4537E;}

/* メイン */
.main{padding:12px;max-width:600px;margin:0 auto;}

/* 凡例 */
.legend{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#B4B2A9;}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.dot-shibu{background:#D4537E;}
.dot-chiku{background:#5B9BD5;}

/* コントロールバー */
.ctrl-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;}
.month-nav{display:flex;align-items:center;gap:8px;}
.nav-btn{background:#2C2C3E;border:0.5px solid #444460;color:#F1EFE8;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{background:#3C3C4E;border-color:#D4537E;}
.month-label{font-size:15px;font-weight:600;min-width:100px;text-align:center;}
.view-toggle{display:flex;background:#2C2C3E;border:0.5px solid #444460;border-radius:8px;overflow:hidden;}
.view-btn{background:transparent;border:none;color:#888780;font-size:12px;padding:6px 14px;cursor:pointer;}
.view-btn.active{background:#D4537E;color:#fff;font-weight:600;}

/* 月表示カレンダー */
.cal-card{background:#2C2C3E;border-radius:12px;border:0.5px solid #444460;overflow:hidden;margin-bottom:12px;}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid #444460;}
.cal-head-cell{text-align:center;font-size:11px;color:#888780;padding:7px 2px;}
.cal-head-cell:first-child{color:#E07070;}
.cal-head-cell:last-child{color:#7090E0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:72px;border-right:0.5px solid #333350;border-bottom:0.5px solid #333350;padding:4px 3px;vertical-align:top;position:relative;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.other-month .day-num{color:#444460;}
.cal-cell.today .day-num{background:#D4537E;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
.day-num{font-size:11px;font-weight:500;margin-bottom:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
.cal-cell:nth-child(7n+1) .day-num{color:#E07070;}
.cal-cell:nth-child(7n) .day-num{color:#7090E0;}
.event-chip{font-size:9px;padding:2px 4px;border-radius:4px;margin-bottom:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.4;}
.event-chip.shibu{background:#7A2040;color:#FAB4C8;border-left:2px solid #D4537E;}
.event-chip.chiku{background:#1A3A5C;color:#A8C8F0;border-left:2px solid #5B9BD5;}
.event-chip:hover{opacity:.8;}
.more-chip{font-size:9px;color:#888780;padding:1px 3px;}

/* 週表示 */
.week-card{background:#2C2C3E;border-radius:12px;border:0.5px solid #444460;overflow:hidden;margin-bottom:12px;}
.week-head{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:0.5px solid #444460;}
.week-head-time{padding:7px 4px;font-size:10px;color:#444460;}
.week-head-day{text-align:center;padding:7px 2px;}
.week-head-day .wd{font-size:10px;color:#888780;}
.week-head-day .dn{font-size:14px;font-weight:600;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.week-head-day.today .dn{background:#D4537E;color:#fff;border-radius:50%;}
.week-head-day:first-of-type .wd{color:#E07070;}
.week-head-day:last-of-type .wd{color:#7090E0;}
.week-body{display:grid;grid-template-columns:48px repeat(7,1fr);min-height:300px;}
.week-time-col{border-right:0.5px solid #333350;}
.week-time-slot{height:60px;font-size:9px;color:#555570;padding:4px;border-bottom:0.5px solid #2A2A3E;display:flex;align-items:flex-start;}
.week-day-col{border-right:0.5px solid #333350;position:relative;}
.week-day-col:last-child{border-right:none;}
.week-slot{height:60px;border-bottom:0.5px solid #2A2A3E;}
.week-event{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 4px;font-size:9px;cursor:pointer;overflow:hidden;z-index:1;}
.week-event.shibu{background:#7A2040;color:#FAB4C8;border-left:2px solid #D4537E;}
.week-event.chiku{background:#1A3A5C;color:#A8C8F0;border-left:2px solid #5B9BD5;}
.week-event:hover{opacity:.8;}

/* 終日イベント行 */
.week-allday{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:0.5px solid #444460;min-height:24px;}
.week-allday-label{font-size:9px;color:#555570;padding:4px;display:flex;align-items:center;}
.week-allday-cell{padding:2px;position:relative;}

/* イベント詳細モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;display:none;}
.modal-overlay.open{display:flex;}
.modal{background:#2C2C3E;border-radius:16px;border:0.5px solid #444460;padding:20px;max-width:360px;width:100%;position:relative;}
.modal-close{position:absolute;top:12px;right:12px;background:transparent;border:none;color:#888780;font-size:18px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.modal-close:hover{background:#3C3C4E;color:#F1EFE8;}
.modal-type{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;margin-bottom:10px;}
.modal-type.shibu{background:#7A2040;color:#FAB4C8;}
.modal-type.chiku{background:#1A3A5C;color:#A8C8F0;}
.modal-title{font-size:18px;font-weight:600;margin-bottom:8px;}
.modal-row{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#B4B2A9;margin-bottom:6px;}
.modal-icon{font-size:14px;flex-shrink:0;margin-top:1px;}

/* ローディング */
.loading{text-align:center;padding:60px 20px;color:#888780;font-size:14px;}

/* 更新行 */
.update-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#666680;margin-bottom:10px;}
.update-dot{width:6px;height:6px;border-radius:50%;background:#97C459;display:inline-block;margin-right:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

.footer{text-align:center;font-size:11px;color:#444460;padding:14px;border-top:0.5px solid #2C2C3E;line-height:1.8;}
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">🌸</div>
  <div>
    <div class="header-title">船穂東お題目プロジェクト</div>
    <div class="header-sub">スケジュール</div>
  </div>
  <a href="index.html" class="back-btn">← 進捗</a>
</div>

<div class="main">
  <div id="loading" class="loading">🌸 読み込み中...</div>
  <div id="content" style="display:none;">

    <div class="legend">
      <div class="legend-item"><div class="legend-dot dot-shibu"></div>支部</div>
      <div class="legend-item"><div class="legend-dot dot-chiku"></div>地区</div>
    </div>

    <div class="ctrl-bar">
      <div class="month-nav">
        <button class="nav-btn" id="prevBtn">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="nav-btn" id="nextBtn">›</button>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="btnMonth" onclick="switchView('month')">月</button>
        <button class="view-btn" id="btnWeek" onclick="switchView('week')">週</button>
      </div>
    </div>

    <!-- 月表示 -->
    <div id="monthView">
      <div class="cal-card">
        <div class="cal-head">
          <div class="cal-head-cell">日</div>
          <div class="cal-head-cell">月</div>
          <div class="cal-head-cell">火</div>
          <div class="cal-head-cell">水</div>
          <div class="cal-head-cell">木</div>
          <div class="cal-head-cell">金</div>
          <div class="cal-head-cell">土</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>

    <!-- 週表示 -->
    <div id="weekView" style="display:none;">
      <div class="week-card">
        <div class="week-head">
          <div class="week-head-time"></div>
          <!-- JS で埋める -->
        </div>
        <div class="week-allday">
          <div class="week-allday-label">終日</div>
          <!-- JS で埋める -->
        </div>
        <div class="week-body" id="weekBody">
          <!-- JS で埋める -->
        </div>
      </div>
    </div>

    <div class="update-row">
      <span><span class="update-dot"></span>5分ごとに自動更新</span>
      <span id="updateTime"></span>
    </div>
  </div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-type" id="mType"></div>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-row"><span class="modal-icon">📅</span><span id="mDate"></span></div>
    <div class="modal-row"><span class="modal-icon">⏰</span><span id="mTime"></span></div>
    <div class="modal-row"><span class="modal-icon">📍</span><span id="mPlace"></span></div>
  </div>
</div>

<div class="footer">
  船穂東お題目プロジェクト 🌸<br>
  スケジュールはLINEで管理者が更新します
</div>

<script>
// ★ GASデプロイURLに書き換える
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzk7FH4kcaX834sEQYIwgjm2xffm_U5lS5cRetZfuLBwrXNLw_63CZSZQgHZfQNXLGRUg/exec';

let events = [];
let currentDate = new Date();
let viewMode = 'month';

const WEEK_DAYS = ['日','月','火','水','木','金','土'];
const HOURS = Array.from({length:15},(_,i)=>i+7); // 7〜21時

// ---------- データ取得 ----------
function fetchEvents() {
  fetch(GAS_URL + '?mode=schedule')
    .then(r => r.json())
    .then(d => {
      events = d.events || [];
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      render();
      document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('ja-JP');
    })
    .catch(err => {
      console.error(err);
      // エラー時もUIは表示
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      render();
    });
}

// ---------- ビュー切り替え ----------
function switchView(mode) {
  viewMode = mode;
  document.getElementById('btnMonth').classList.toggle('active', mode === 'month');
  document.getElementById('btnWeek').classList.toggle('active', mode === 'week');
  document.getElementById('monthView').style.display = mode === 'month' ? '' : 'none';
  document.getElementById('weekView').style.display = mode === 'week' ? '' : 'none';
  render();
}

function render() {
  updateLabel();
  if (viewMode === 'month') renderMonth();
  else renderWeek();
}

function updateLabel() {
  if (viewMode === 'month') {
    document.getElementById('monthLabel').textContent =
      currentDate.getFullYear() + '年' + (currentDate.getMonth()+1) + '月';
  } else {
    const mon = weekStart(currentDate);
    const sun = new Date(mon); sun.setDate(sun.getDate()+6);
    document.getElementById('monthLabel').textContent =
      (mon.getMonth()+1) + '/' + mon.getDate() + '〜' + (sun.getMonth()+1) + '/' + sun.getDate();
  }
}

document.getElementById('prevBtn').onclick = () => {
  if (viewMode === 'month') {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1);
  } else {
    currentDate.setDate(currentDate.getDate()-7);
  }
  render();
};
document.getElementById('nextBtn').onclick = () => {
  if (viewMode === 'month') {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1);
  } else {
    currentDate.setDate(currentDate.getDate()+7);
  }
  render();
};

// ---------- 月表示 ----------
function renderMonth() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  const first = new Date(y, m, 1);
  const last  = new Date(y, m+1, 0);
  const today = toDateStr(new Date());

  // 前月埋め
  for (let i = 0; i < first.getDay(); i++) {
    const d = new Date(y, m, -first.getDay()+i+1);
    grid.appendChild(makeCell(d, true));
  }
  for (let d = 1; d <= last.getDate(); d++) {
    const dt = new Date(y, m, d);
    grid.appendChild(makeCell(dt, false));
  }
  // 後月埋め
  const filled = first.getDay() + last.getDate();
  const remain = filled % 7 === 0 ? 0 : 7 - (filled % 7);
  for (let d = 1; d <= remain; d++) {
    const dt = new Date(y, m+1, d);
    grid.appendChild(makeCell(dt, true));
  }
}

function makeCell(date, otherMonth) {
  const cell = document.createElement('div');
  cell.className = 'cal-cell' + (otherMonth ? ' other-month' : '');
  const ds = toDateStr(date);
  const todayStr = toDateStr(new Date());
  if (ds === todayStr) cell.classList.add('today');

  const dn = document.createElement('div');
  dn.className = 'day-num';
  dn.textContent = date.getDate();
  cell.appendChild(dn);

  const dayEvents = events.filter(e => e.date === ds);
  const show = dayEvents.slice(0, 3);
  show.forEach(ev => {
    const chip = document.createElement('div');
    chip.className = 'event-chip ' + (ev.type === '支部' ? 'shibu' : 'chiku');
    chip.textContent = (ev.time ? ev.time.slice(0,5)+' ' : '') + ev.title;
    chip.onclick = () => openModal(ev);
    cell.appendChild(chip);
  });
  if (dayEvents.length > 3) {
    const more = document.createElement('div');
    more.className = 'more-chip';
    more.textContent = '+' + (dayEvents.length-3) + '件';
    cell.appendChild(more);
  }
  return cell;
}

// ---------- 週表示 ----------
function weekStart(date) {
  const d = new Date(date);
  d.setDate(d.getDate() - d.getDay());
  d.setHours(0,0,0,0);
  return d;
}

function renderWeek() {
  const mon = weekStart(currentDate);
  const days = Array.from({length:7}, (_,i) => { const d=new Date(mon); d.setDate(d.getDate()+i); return d; });
  const todayStr = toDateStr(new Date());

  // ヘッダー再構築
  const head = document.querySelector('.week-head');
  head.innerHTML = '<div class="week-head-time"></div>';
  days.forEach((d,i) => {
    const cell = document.createElement('div');
    cell.className = 'week-head-day' + (toDateStr(d)===todayStr?' today':'');
    cell.innerHTML = '<div class="wd">' + WEEK_DAYS[d.getDay()] + '</div>' +
                     '<div class="dn">' + d.getDate() + '</div>';
    head.appendChild(cell);
  });

  // 終日行
  const allday = document.querySelector('.week-allday');
  allday.innerHTML = '<div class="week-allday-label">終日</div>';
  days.forEach(d => {
    const cell = document.createElement('div');
    cell.className = 'week-allday-cell';
    const ds = toDateStr(d);
    events.filter(e => e.date===ds && !e.time).forEach(ev => {
      const chip = document.createElement('div');
      chip.className = 'event-chip ' + (ev.type==='支部'?'shibu':'chiku');
      chip.style.cssText = 'font-size:9px;margin-bottom:1px;';
      chip.textContent = ev.title;
      chip.onclick = () => openModal(ev);
      cell.appendChild(chip);
    });
    allday.appendChild(cell);
  });

  // ボディ
  const body = document.getElementById('weekBody');
  body.innerHTML = '';

  // 時間列
  const timeCol = document.createElement('div');
  timeCol.className = 'week-time-col';
  HOURS.forEach(h => {
    const slot = document.createElement('div');
    slot.className = 'week-time-slot';
    slot.textContent = h + ':00';
    timeCol.appendChild(slot);
  });
  body.appendChild(timeCol);

  // 各曜日
  days.forEach(d => {
    const col = document.createElement('div');
    col.className = 'week-day-col';
    col.style.position = 'relative';

    HOURS.forEach(h => {
      const slot = document.createElement('div');
      slot.className = 'week-slot';
      col.appendChild(slot);
    });

    // イベント配置
    const ds = toDateStr(d);
    events.filter(e => e.date===ds && e.time).forEach(ev => {
      const [hh, mm] = ev.time.split(':').map(Number);
      if (hh < HOURS[0] || hh > HOURS[HOURS.length-1]) return;
      const top = (hh - HOURS[0]) * 60 + mm;
      const el = document.createElement('div');
      el.className = 'week-event ' + (ev.type==='支部'?'shibu':'chiku');
      el.style.top = top + 'px';
      el.style.height = '54px';
      el.innerHTML = '<strong>' + ev.time.slice(0,5) + '</strong><br>' + ev.title;
      if (ev.place) el.innerHTML += '<br>📍' + ev.place;
      el.onclick = () => openModal(ev);
      col.appendChild(el);
    });

    body.appendChild(col);
  });
}

// ---------- モーダル ----------
function openModal(ev) {
  document.getElementById('mType').textContent = ev.type;
  document.getElementById('mType').className = 'modal-type ' + (ev.type==='支部'?'shibu':'chiku');
  document.getElementById('mTitle').textContent = ev.title;
  document.getElementById('mDate').textContent = ev.date.replace(/-/g,'/') + (ev.time?' (' + formatWeekDay(ev.date) + ')' : '');
  document.getElementById('mTime').textContent = ev.time || '終日';
  document.getElementById('mPlace').textContent = ev.place || '—';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target===document.getElementById('modalOverlay') || e.currentTarget.classList.contains('modal-close')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}
function formatWeekDay(dateStr) {
  return WEEK_DAYS[new Date(dateStr).getDay()] + '曜';
}

// ---------- ユーティリティ ----------
function toDateStr(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

// ---------- 初期化 ----------
fetchEvents();
setInterval(fetchEvents, 300000); // 5分
</script>
</body>
</html>
